# Copy this file to voices.yaml and edit. voices.yaml is gitignored.
#
# Named voice presets — in jobs.yaml, use `voice: "alias"` instead of
# setting tts_server + voice_name by hand.
#
# Your MoneyPrinterTurbo setup selects the TTS engine via the `tts_server`
# field, and voice_name uses a "provider:voice" format (e.g. "gemini:puck").
# Each preset below sets BOTH fields together so they can never drift apart
# — switching `voice` in a job always switches provider and voice name as
# one atomic choice.
#
# Confirmed providers below: gtts, gemini. If your fork supports others
# (edge, azure, siliconflow, ...), check its voice.py for the exact
# tts_server value and voice_name prefix it expects, then add a section
# here following the same pattern.

# ── gTTS — Google Translate TTS. Free, no API key. No named voice personas,
#    just a language code (it picks one standard voice per language).
gtts:
  gtts_en:
    tts_server: "gtts"
    voice_name: "gtts:en"
  gtts_es:
    tts_server: "gtts"
    voice_name: "gtts:es"
  gtts_fr:
    tts_server: "gtts"
    voice_name: "gtts:fr"
  gtts_de:
    tts_server: "gtts"
    voice_name: "gtts:de"
  gtts_pt:
    tts_server: "gtts"
    voice_name: "gtts:pt"

# ── Gemini TTS — requires a Gemini API key configured on the
#    MoneyPrinterTurbo server. Full voice list (30 voices):
#    https://ai.google.dev/gemini-api/docs/speech-generation
gemini:
  gemini_puck:
    tts_server: "gemini"
    voice_name: "gemini:puck"
  gemini_aoede:
    tts_server: "gemini"
    voice_name: "gemini:aoede"
  gemini_kore:
    tts_server: "gemini"
    voice_name: "gemini:kore"
  gemini_charon:
    tts_server: "gemini"
    voice_name: "gemini:charon"
  gemini_fenrir:
    tts_server: "gemini"
    voice_name: "gemini:fenrir"
  gemini_leda:
    tts_server: "gemini"
    voice_name: "gemini:leda"

# ── voice_rate / voice_volume can be part of a preset too, if a particular
#    voice sounds best at a non-default pace or level.
# gemini:
#   gemini_aoede_fast:
#     tts_server: "gemini"
#     voice_name: "gemini:aoede"
#     voice_rate: 1.3
#     voice_volume: 1
